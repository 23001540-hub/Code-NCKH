<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIS Demand Forecast - Pulse</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #0f111a; font-family: 'Inter', 'Segoe UI', sans-serif; color: #f8fafc; padding: 40px 20px; }
    .chart-widget { background: #161824; border: 1px solid #2a2e40; border-radius: 16px; max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4); overflow: hidden; }
    /* --- HEADER & CONTROLS --- */
    .widget-header { padding: 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; flex-wrap: wrap; gap: 16px;}
    .widget-title { font-size: 1.15rem; font-weight: 600; color: #f8fafc; margin-bottom: 4px; display: flex; align-items: center; gap: 8px;}
    .widget-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background: #3b82f6; border-radius: 4px; }
    .widget-subtitle { font-size: 0.85rem; color: #8b95a5; }
    .widget-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap;}
    
    /* Form Inputs */
    .fsku-input-style { background: #0f111a; border: 1px solid #2a2e40; color: #f8fafc; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; outline: none; transition: border-color 0.2s; }
    .fsku-input-style:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    .fsku-input-style:disabled { opacity: 0.5; cursor: not-allowed; }
    .group-select { width: 180px; cursor: pointer; }
    .fsku-search { width: 240px; font-family: 'JetBrains Mono', monospace; }
    .selected-chips-container { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { display: inline-flex; align-items: center; gap: 8px; background: #1e2230; border: 1px solid #3f4560; border-radius: 6px; padding: 4px 10px; font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; color: #f8fafc; }
    .chip-group { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-family: 'Inter', sans-serif; }
    .chip-close { cursor: pointer; color: #8b95a5; font-weight: bold; transition: color 0.2s; }
    .chip-close:hover { color: #ef4444; }
    /* Màu nhóm hàng*/
    .g1 { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .g2 { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    .g3 { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .g4 { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    /* --- CHART AREA --- */
    .widget-body { padding: 24px; position: relative; height: 400px; width: 100%; }
    /* --- SUMMARY FOOTER --- */
    .widget-footer { background: #0f111a; padding: 16px 24px; display: flex; gap: 32px; border-top: 1px solid #2a2e40; flex-wrap: wrap;}
    .metric-item { display: flex; flex-direction: column; gap: 4px; }
    .metric-label { font-size: 0.75rem; color: #8b95a5; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    .metric-value { font-size: 1.1rem; font-weight: 700; color: #f8fafc; font-family: 'JetBrains Mono', monospace;}
    .metric-value.highlight { color: #10b981; } 
    #loading-msg { font-size: 0.85rem; color: #f59e0b; display: none; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="chart-widget">
    <div class="widget-header">
      <div class="header-top">
        <div>
          <h3 class="widget-title">Sản lượng FSKU bán ra qua các tháng</h3>
          <p class="widget-subtitle">Lọc theo nhóm và chọn mã để xem chi tiết</p>
          <div id="loading-msg">Đang xử lý dữ liệu...</div>
        </div>
        
        <div class="widget-controls">
          <select id="groupSelect" class="fsku-input-style group-select" disabled>
            <option value="all">Tất cả Nhóm</option>
            <option value="Nhóm 1">Nhóm 1 (>= 12 tháng)</option>
            <option value="Nhóm 2">Nhóm 2 (3-11 tháng)</option>
            <option value="Nhóm 3">Nhóm 3 (&lt; 3 tháng)</option>
            <option value="Nhóm 4">Nhóm 4 (Không bán)</option>
          </select>
          <input list="fsku-list" id="fskuInput" class="fsku-input-style fsku-search" placeholder="Chọn hoặc Nhập FSKU..." disabled>
          <datalist id="fsku-list"></datalist>
        </div>
      </div>
      <div class="selected-chips-container" id="chipsContainer"></div>
    </div>
    <div class="widget-body">
      <canvas id="mainLineChart"></canvas>
    </div>
    <div class="widget-footer">
      <div class="metric-item">
        <span class="metric-label">Tổng sản lượng (Các mã đã chọn)</span>
        <span class="metric-value highlight" id="metric-total">0</span>
      </div>
    </div>
  </div>

  <script>
    let monthlyDataDb = {};
    let fskuGroupsDb = {}; 
    let globalMonths = [];
    let selectedFskus = []; 
    let lineChart;

    const chartColors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899'];
    const groupSelect = document.getElementById('groupSelect');
    const fskuInput = document.getElementById('fskuInput');
    const fskuList = document.getElementById('fsku-list');
    const chipsContainer = document.getElementById('chipsContainer');
    const loadingMsg = document.getElementById('loading-msg');
    const ctx = document.getElementById('mainLineChart').getContext('2d');

    //1. HÀM KHỞI TẠO CHART
    function initChart() {
      lineChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [] },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#161824', titleColor: '#8b95a5', bodyColor: '#f8fafc',
              borderColor: '#2a2e40', borderWidth: 1, padding: 12, cornerRadius: 8,
              bodyFont: { size: 13, family: 'monospace' },
              callbacks: { label: (ctx) => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('vi-VN')} SP` }
            }
          },
          scales: {
            x: { grid: { color: 'rgba(255, 255, 255, 0.03)', drawBorder: false }, ticks: { color: '#8b95a5' } },
            y: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.05)', borderDash: [4, 4] }, ticks: { color: '#8b95a5' } }
          }
        }
      });
    }

    //2. HÀM XỬ LÝ CHUỖI CSV TRỰC TIẾP SAU KHI GẮN CỨNG
    function processData(csvString) {
      loadingMsg.style.display = "block";
      fskuInput.disabled = true;
      groupSelect.disabled = true;

      //Parse trực tiếp chuỗi CSV
      Papa.parse(csvString, {
        header: true, dynamicTyping: true, skipEmptyLines: true,
        complete: function(results) {
          const rawData = results.data;
          
          const monthSet = new Set();
          rawData.forEach(row => { if(row.year_month) monthSet.add(row.year_month); });
          globalMonths = Array.from(monthSet).sort();

          const grouped = {};
          rawData.forEach(row => {
            const fsku = row.fsku; const month = row.year_month; const qty = Number(row.qty) || 0;
            if(!fsku || !month) return;
            if(!grouped[fsku]) grouped[fsku] = {};
            if(!grouped[fsku][month]) grouped[fsku][month] = 0;
            grouped[fsku][month] += qty;
          });

          monthlyDataDb = {};
          fskuGroupsDb = {};

          Object.keys(grouped).forEach(fsku => {
            const dataArr = globalMonths.map(m => grouped[fsku][m] || 0);
            monthlyDataDb[fsku] = dataArr;

            const activeMonths = dataArr.filter(val => val > 0).length;
            if (activeMonths >= 12) fskuGroupsDb[fsku] = { name: 'Nhóm 1', class: 'g1' };
            else if (activeMonths >= 3) fskuGroupsDb[fsku] = { name: 'Nhóm 2', class: 'g2' };
            else if (activeMonths > 0) fskuGroupsDb[fsku] = { name: 'Nhóm 3', class: 'g3' };
            else fskuGroupsDb[fsku] = { name: 'Nhóm 4', class: 'g4' };
          });

          populateFskuList('all');

          loadingMsg.style.display = "none";
          fskuInput.disabled = false;
          groupSelect.disabled = false;
          
          const sortedFskus = Object.keys(monthlyDataDb).sort();
          if (sortedFskus.length > 0) {
              selectedFskus = [sortedFskus[0]];
              updateDashboard();
          }
        }
      });
    }

    //3. HÀM CẬP NHẬT CHỌN MÃ THEO NHÓM
    function populateFskuList(selectedGroup) {
      fskuList.innerHTML = '';
      const allFskus = Object.keys(monthlyDataDb).sort();
      
      allFskus.forEach(fsku => {
        if (selectedGroup === 'all' || fskuGroupsDb[fsku].name === selectedGroup) {
          let opt = document.createElement('option'); 
          opt.value = fsku; 
          fskuList.appendChild(opt);
        }
      });
    }

    groupSelect.addEventListener('change', (e) => {
      populateFskuList(e.target.value);
      fskuInput.value = '';
      fskuInput.placeholder = `Nhập FSKU thuộc ${e.target.value !== 'all' ? e.target.value : 'Tất cả'}...`;
    });

    //4. THÊM / XÓA MÃ TỪ Ô TÌM KIẾM
    fskuInput.addEventListener('input', (e) => {
      const val = e.target.value;
      if(monthlyDataDb[val] && !selectedFskus.includes(val)) {
        if (selectedFskus.length >= 6) {
          alert('Bạn chỉ được chọn tối đa 6 mã cùng lúc!');
          e.target.value = ''; 
          return; 
        }
        selectedFskus.push(val);
        e.target.value = ''; 
        updateDashboard();
      }
    });

    function removeFsku(fsku) {
      selectedFskus = selectedFskus.filter(item => item !== fsku);
      updateDashboard();
    }

    //5. GIAO DIỆN CHUNG
    function updateDashboard() {
      renderChips();
      renderChart();
      updateMetrics();
    }

    function renderChips() {
      chipsContainer.innerHTML = '';
      selectedFskus.forEach((fsku, index) => {
        const group = fskuGroupsDb[fsku];
        const color = chartColors[index % chartColors.length];
        
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.style.borderColor = color;
        
        chip.innerHTML = `
          <div class="chip-group ${group.class}">${group.name}</div>
          <span style="color: ${color}">${fsku}</span>
          <div class="chip-close" onclick="removeFsku('${fsku}')">✕</div>
        `;
        chipsContainer.appendChild(chip);
      });
    }

    function renderChart() {
      lineChart.data.labels = globalMonths;
      lineChart.data.datasets = selectedFskus.map((fsku, index) => {
        const color = chartColors[index % chartColors.length];
        return {
          label: fsku,
          data: monthlyDataDb[fsku],
          borderColor: color,
          backgroundColor: color + '20', 
          borderWidth: 2,
          pointBackgroundColor: '#0f111a',
          pointBorderColor: color,
          pointBorderWidth: 2,
          pointRadius: selectedFskus.length > 1 ? 0 : 3, 
          pointHoverRadius: 6,
          fill: selectedFskus.length === 1, 
          tension: 0.4
        };
      });
      lineChart.update();
    }

    function updateMetrics() {
      if(selectedFskus.length === 0) {
        document.getElementById('metric-total').innerText = '0';
        return;
      }

      let combinedData = new Array(globalMonths.length).fill(0);
      
      selectedFskus.forEach(fsku => {
        monthlyDataDb[fsku].forEach((val, i) => { combinedData[i] += val; });
      });

      const total = combinedData.reduce((sum, val) => sum + val, 0);
      document.getElementById('metric-total').innerText = total.toLocaleString('vi-VN');
    }

    initChart();
